# Proxy nginx delante de Jaeger UI. Inyecta jaeger-dark-fix.css en el HTML
# para corregir el bug de contraste del modo oscuro (ver ese archivo).
# Escucha el puerto que antes publicaba Jaeger; Jaeger queda solo en la red interna.
server {
    listen 16686;
    server_name _;

    # CSS de arreglo, servido localmente por el proxy.
    location = /claude-dark-fix.css {
        alias /etc/nginx/claude-dark-fix.css;
        default_type text/css;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://jaeger:16686;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # gzip off en el upstream: sub_filter solo opera sobre respuestas sin comprimir.
        proxy_set_header Accept-Encoding "";

        # Inyecta el <link> del CSS justo antes de cerrar el <head>.
        sub_filter '</head>' '<link rel="stylesheet" href="/claude-dark-fix.css"></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
