# Prometheus de la flota — almacena las métricas RED que produce el
# OpenTelemetry Collector (conector spanmetrics). Jaeger las consulta para
# el tab "Monitor" (SPM).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Métricas spanmetrics expuestas por el collector.
  - job_name: 'otel-collector-spanmetrics'
    static_configs:
      - targets: ['otel-collector:8889']
