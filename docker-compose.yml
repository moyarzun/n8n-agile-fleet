services:
  n8n-mcp-fleet:
    build: .
    container_name: n8n-agile-fleet
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JIRA_URL=${JIRA_URL}
      - JIRA_USER=${JIRA_USER}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./agile_scripts:/data/scripts
      - ${WORKSPACE_DIR:-./workspace_placeholder}:/workspace
      - ${PROJECTS_DIR:-..}:/projects
      - ${VAULTS_DIR:-/Users/moyarzun/vaults}:/vaults
    depends_on:
      fleet-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  fleet-api:
    build: .
    container_name: langgraph-fleet-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JIRA_URL=${JIRA_URL}
      - JIRA_USER=${JIRA_USER}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - FLEET_DB=/data/n8n_store/fleet.db
      # Checkpoints durables de LangGraph (spec langgraph-hardening, Req 1)
      - FLEET_CHECKPOINT_DB=/data/n8n_store/checkpoints.db
      # Reanudación automática de jobs interrumpidos al arrancar (Req 2)
      - FLEET_AUTO_RESUME=${FLEET_AUTO_RESUME:-false}
      # Trazas OTel → OpenTelemetry Collector (deriva métricas RED para el
      # tab Monitor de Jaeger y reenvía las trazas). Vacío = tracing off (Req 6).
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      # Comando de validación determinista del proyecto (corre la suite real).
      - FLEET_VALIDATE_CMD=${FLEET_VALIDATE_CMD:-}
      - FLEET_VALIDATE_TIMEOUT=${FLEET_VALIDATE_TIMEOUT:-600}
      # Permite operar repos montados desde el host (distintos owners de UID)
      - GIT_CONFIG_GLOBAL=/root/.gitconfig
    volumes:
      - ./agile_scripts:/data/scripts
      - ${WORKSPACE_DIR:-./workspace_placeholder}:/workspace
      # Raíz de proyectos de Claude → cualquier proyecto reachable en /projects/<Nombre>
      # (modo requerimiento libre /solve). Default: el padre de n8n.
      - ${PROJECTS_DIR:-..}:/projects
      - ${VAULTS_DIR:-/Users/moyarzun/vaults}:/vaults
      - n8n_data:/data/n8n_store
    working_dir: /data/scripts
    command: ["uvicorn", "fleet_api:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend + UI de trazas OTel (spec langgraph-hardening, Req 6.5).
  # Con SPM habilitado: lee métricas RED desde Prometheus para el tab Monitor.
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: fleet-jaeger
    restart: unless-stopped
    # La UI se publica vía jaeger-proxy (inyecta el fix de dark mode); Jaeger
    # queda solo en la red interna, accesible como jaeger:16686.
    expose:
      - "16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Service Performance Monitoring (SPM): fuente de métricas = Prometheus.
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      # El conector span_metrics prefija las métricas con este namespace
      # (traces_span_metrics_calls_total, ..._duration_milliseconds_bucket).
      - PROMETHEUS_QUERY_NAMESPACE=traces_span_metrics
      # Normaliza nombres/labels a los que emite el exporter Prometheus del collector.
      - PROMETHEUS_QUERY_NORMALIZE_CALLS=true
      - PROMETHEUS_QUERY_NORMALIZE_DURATION=true
    depends_on:
      - prometheus

  # Proxy que sirve la UI de Jaeger inyectando el fix del modo oscuro.
  jaeger-proxy:
    image: nginx:alpine
    container_name: fleet-jaeger-proxy
    restart: unless-stopped
    ports:
      - "16686:16686"   # UI de Jaeger (con dark mode corregido)
    volumes:
      - ./observability/jaeger-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./observability/jaeger-dark-fix.css:/etc/nginx/claude-dark-fix.css:ro
    depends_on:
      - jaeger

  # Collector: deriva métricas RED (spanmetrics) desde las trazas y reenvía
  # las trazas a Jaeger. Ver observability/otel-collector-config.yaml.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: fleet-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - jaeger

  # Almacena las métricas RED que produce el collector; Jaeger las consulta (SPM).
  prometheus:
    image: prom/prometheus:latest
    container_name: fleet-prometheus
    restart: unless-stopped
    ports:
      # 9091 en el host (9090 lo ocupa Calibre); Jaeger igual lo alcanza en la
      # red interna vía prometheus:9090.
      - "9091:9090"   # UI/API de Prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  mcp-fleet-server:
    build: .
    container_name: mcp-fleet-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - FLEET_API_URL=http://langgraph-fleet-api:8000
    volumes:
      - ./agile_scripts:/data/scripts
    working_dir: /data/scripts
    command: ["uvicorn", "mcp_fleet_server:mcp", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      fleet-api:
        condition: service_healthy

volumes:
  n8n_data:
  prometheus_data:
